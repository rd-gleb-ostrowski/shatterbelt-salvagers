<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shatterbelt Salvagers — Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #05040f; overflow: hidden; width: 100vw; height: 100vh; }
      #viewer-canvas-container { width: 100%; height: 100%; }
      #status-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        padding: 4px 12px; background: rgba(10,8,30,0.85);
        color: #7b6fcf; font-family: monospace; font-size: 11px;
        border-top: 1px solid #2a2050;
      }

      /* ── HUD overlay ──────────────────────────────────────────────────────── */
      #hud-overlay {
        position: fixed; inset: 0; pointer-events: none;
        font-family: monospace; font-size: 12px; color: #e0daf8;
        z-index: 10;
      }

      /* Timer — top-centre */
      #hud-timer {
        position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
        font-size: 22px; font-weight: bold; letter-spacing: 2px;
        color: #ffe66d; text-shadow: 0 0 8px rgba(255,230,109,0.6);
        background: rgba(10,8,30,0.7); padding: 4px 16px; border-radius: 4px;
        border: 1px solid rgba(255,230,109,0.25);
      }

      /* Scoreboard — top-left */
      #hud-scoreboard {
        position: absolute; top: 12px; left: 12px;
        background: rgba(10,8,30,0.8); padding: 8px 12px;
        border-radius: 6px; border: 1px solid #2a2050; min-width: 160px;
      }

      /* Ladder — top-right */
      #hud-ladder {
        position: absolute; top: 12px; right: 12px;
        background: rgba(10,8,30,0.8); padding: 8px 12px;
        border-radius: 6px; border: 1px solid #2a2050; min-width: 220px;
      }

      .hud-panel-title {
        font-size: 10px; letter-spacing: 1px; color: #7b6fcf;
        margin-bottom: 6px; text-transform: uppercase;
      }

      /* Scoreboard rows */
      .hud-score-row {
        display: flex; align-items: center; gap: 6px;
        padding: 2px 0; border-bottom: 1px solid rgba(42,32,80,0.5);
      }
      .hud-score-row:last-child { border-bottom: none; }
      .hud-team-dot { font-size: 10px; flex-shrink: 0; }
      .hud-team-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .hud-score { font-weight: bold; color: #ffe66d; min-width: 36px; text-align: right; }
      .hud-relics { color: #4ecdc4; min-width: 32px; text-align: right; font-size: 11px; }

      /* Ladder rows */
      .hud-ladder-header, .hud-ladder-row {
        display: grid;
        grid-template-columns: 20px 1fr 48px 28px;
        gap: 4px; padding: 2px 0; align-items: center;
      }
      .hud-ladder-header {
        font-size: 9px; color: #7b6fcf; letter-spacing: 1px;
        border-bottom: 1px solid #2a2050; margin-bottom: 2px;
      }
      .hud-ladder-row { border-bottom: 1px solid rgba(42,32,80,0.4); }
      .hud-ladder-row:last-child { border-bottom: none; }
      .hud-rank { color: #7b6fcf; text-align: right; padding-right: 4px; }
      .hud-competitor { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .hud-skill { color: #a8e6cf; text-align: right; }
      .hud-matches { color: #7b6fcf; text-align: right; font-size: 10px; }

      /* ── Replay panel (issue 07) ──────────────────────────────────────────── */
      #replay-panel {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        background: rgba(10,8,30,0.92); border: 1px solid #2a2050;
        border-radius: 8px; padding: 10px 16px; display: flex;
        flex-direction: column; gap: 8px; z-index: 20;
        font-family: monospace; font-size: 12px; color: #e0daf8;
        min-width: 480px; max-width: 90vw;
        pointer-events: all;
      }
      #replay-panel.hidden { display: none; }
      #replay-top-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      #replay-recording-select {
        flex: 1; background: #0d0b22; color: #e0daf8; border: 1px solid #2a2050;
        border-radius: 4px; padding: 3px 6px; font-family: monospace; font-size: 11px;
      }
      #replay-load-btn, #replay-live-btn, #replay-playpause-btn {
        background: #1a1640; color: #a89ee0; border: 1px solid #2a2050;
        border-radius: 4px; padding: 3px 10px; cursor: pointer; font-family: monospace;
        font-size: 11px; white-space: nowrap;
      }
      #replay-load-btn:hover, #replay-live-btn:hover, #replay-playpause-btn:hover {
        background: #2a2050; color: #e0daf8;
      }
      #replay-playpause-btn { min-width: 52px; }
      #replay-bottom-row { display: flex; align-items: center; gap: 8px; }
      #replay-timeline { flex: 1; accent-color: #7b6fcf; cursor: pointer; }
      #replay-speed-select {
        background: #0d0b22; color: #e0daf8; border: 1px solid #2a2050;
        border-radius: 4px; padding: 3px 6px; font-family: monospace; font-size: 11px;
      }
      #replay-tick-label {
        color: #7b6fcf; font-size: 11px; white-space: nowrap; min-width: 80px;
        text-align: right;
      }
      #replay-toggle-btn {
        position: fixed; bottom: 4px; right: 12px;
        background: rgba(10,8,30,0.7); color: #7b6fcf; border: 1px solid #2a2050;
        border-radius: 4px; padding: 2px 8px; cursor: pointer; font-family: monospace;
        font-size: 10px; z-index: 25; pointer-events: all;
      }
      #replay-toggle-btn:hover { background: #1a1640; color: #e0daf8; }
    </style>
  </head>
  <body>
    <div id="viewer-canvas-container"></div>
    <div id="status-bar">⬡ Shatterbelt Salvagers — connecting…</div>

    <!-- Replay panel (issue 07) — wired in main.ts -->
    <div id="replay-panel" class="hidden">
      <div id="replay-top-row">
        <select id="replay-recording-select">
          <option value="">— select a recording… —</option>
        </select>
        <button id="replay-load-btn">▶ Load</button>
        <button id="replay-playpause-btn" disabled>Play</button>
        <button id="replay-live-btn">↩ Live</button>
      </div>
      <div id="replay-bottom-row">
        <input id="replay-timeline" type="range" min="0" max="1000" step="1" value="0" disabled />
        <select id="replay-speed-select">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
        <span id="replay-tick-label">tick —/—</span>
      </div>
    </div>
    <button id="replay-toggle-btn">⏺ Replay</button>

    <script type="module" src="/src/viewer/main.ts"></script>
  </body>
</html>
